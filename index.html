<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Emergency SOS</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#dc2626">
</head>

<body>

<div class="app-background">

<div class="container">

    <div class="header">
        <div class="siren-icon">🚨</div>
        <h1>SMART</h1>
        <h2>EMERGENCY SOS</h2>
        <p class="tagline">Instant emergency alert system</p>
    </div>

    <button class="btn-sos" onclick="triggerSOS('whatsapp')">
        🚨 ACTIVATE SOS
    </button>

    <div id="countdownBox" class="sos-countdown-container" style="display:none;">
        <h3>🚨 Sending SOS in <span id="timer">5</span> seconds</h3>
        <button onclick="cancelSOS()" class="btn-delete">Cancel SOS</button>
    </div>

    <div class="sos-options">

        <button class="btn-save" onclick="triggerSOS('whatsapp')">
            💬 Send SOS via WhatsApp
        </button>

        <button class="btn-save" onclick="triggerSOS('sms')">
            📩 Send SOS via SMS
        </button>

    </div>

    <hr class="divider">

    <input id="name" placeholder="Contact Name" class="input-box">
    <input id="phone" placeholder="Phone Number" class="input-box">

    <button class="btn-save" onclick="saveContact()">Save Contact</button>

    <div id="contactList"></div>

    <button id="installBtn" class="btn-install" style="display:none;">
        📲 Install App
    </button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
